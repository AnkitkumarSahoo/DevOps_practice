name: CICD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is environment value where this workflows run
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"
  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: build docker container
        run: echo "Docker container build"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test the container
        run: echo "Testing the container"
        
  deploy:
    runs-on: ubuntu-latest
    needs: [build,test]
    steps:
      - name: Deploying the app
        run: echo "Docker compose deploying the app"
  
